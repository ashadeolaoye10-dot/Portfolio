<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="loader" id="loader">

    <div class="loader-content">

        <div class="spinner"></div>

        <h1>PIXUS BANK</h1>

        <p>Loading...</p>

    </div>

</div>
<style>
    .loader{

    position:fixed;

    inset:0;

    z-index:10000;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    radial-gradient(circle at top left,#1D4ED8,transparent 30%),
    radial-gradient(circle at bottom right,#60A5FA,transparent 30%),
    #020617;

    transition:.8s;
}

.loader.hide{

    opacity:0;

    visibility:hidden;
}

.loader-content{

    text-align:center;

    color:white;
}

.loader-content h1{

    margin-top:25px;

    letter-spacing:4px;

    color:#60A5FA;
}

.loader-content p{

    margin-top:10px;

    color:#cbd5e1;
}

.spinner{

    width:90px;
    height:90px;

    border-radius:50%;

    border:6px solid
    rgba(255,255,255,.2);

    border-top:
    6px solid #60A5FA;

    animation:
    spin 1s linear infinite;
}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}
</style>
<script>
    window.addEventListener(
"load",
()=>{

    const loader =
    document.getElementById(
    "loader"
    );

    setTimeout(()=>{

        loader.classList.add(
        "hide"
        );

    },1200);

});
</script>
</body>
</html>
