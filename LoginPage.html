<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixus Bank | Login</title>

    <link rel="stylesheet" href="css/login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <div class="left-panel">

        <div class="content">

            <h1>PIXUS BANK</h1>

            <h2>Welcome Back</h2>

            <p>
                Access your account securely and continue
                banking beyond limits.
            </p>

        </div>

    </div>

    <div class="right-panel">

        <form class="login-form">

            <h2>Login</h2>

            <div class="input-group">
                <label>Email</label>
                <input type="email"
                       id="email"
                       placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>

                <div class="password-box">

                    <input type="password"
                           id="password"
                           placeholder="Enter password">

                    <span id="togglePassword">
                        👁
                    </span>

                </div>

            </div>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button type="submit"
                    class="login-btn">
                Login
            </button>

            <p class="register-link">

                Don't have an account?

                <a href="RegisterPage.html">
                    Register
                </a>

            </p>

        </form>

    </div>

</div>
<style>
    :root{
    --primary:#081F5C;
    --secondary:#1D4ED8;
    --accent:#60A5FA;
    --white:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;

    background:
    radial-gradient(circle at top left,#1D4ED8,transparent 30%),
    radial-gradient(circle at bottom right,#60A5FA,transparent 30%),
    #020617;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:1200px;
    min-height:700px;

    display:grid;
    grid-template-columns:1fr 1fr;

    border-radius:25px;
    overflow:hidden;

    backdrop-filter:blur(20px);

    background:rgba(255,255,255,.05);

    border:1px solid rgba(255,255,255,.1);
}

.left-panel{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px;
}

.content h1{
    color:var(--accent);
    margin-bottom:20px;
}

.content h2{
    color:white;
    font-size:3rem;
    margin-bottom:20px;
}

.content p{
    color:#cbd5e1;
    line-height:1.8;
}

.right-panel{
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:50px;
}

.login-form{
    width:100%;
    max-width:420px;
}

.login-form h2{
    margin-bottom:30px;
    color:var(--primary);
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#334155;
}

.input-group input{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #dbeafe;
}

.password-box{
    position:relative;
}

#togglePassword{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

.options{
    display:flex;
    justify-content:space-between;
    margin-bottom:25px;
    font-size:.9rem;
}

.options a{
    text-decoration:none;
    color:var(--secondary);
}

.login-btn{
    width:100%;
    border:none;
    padding:15px;
    color:white;
    cursor:pointer;
    border-radius:12px;

    background:linear-gradient(
    135deg,
    var(--secondary),
    var(--accent));
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    text-decoration:none;
    color:var(--secondary);
}

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .left-panel{
        display:none;
    }
}
</style>

<script>
    const password =
document.getElementById("password");

const togglePassword =
document.getElementById("togglePassword");

togglePassword.addEventListener("click",()=>{

    if(password.type==="password"){

        password.type="text";

        togglePassword.textContent="🙈";

    }else{

        password.type="password";

        togglePassword.textContent="👁";

    }

});


const form =
document.querySelector(".login-form");

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const pass =
    document.getElementById("password").value;

    if(email === "" || pass === ""){

        alert(
        "Please fill all fields"
        );

        return;
    }

    alert(
    "Login Successful!"
    );

});
</script>

</body>
</html>
