<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="splash-screen">

        <!--Background Image-->
        <img src="file_00000000704c7243856b0dd783b72889.png" alt="Pong background">

        <!--Loading Overlay-->
        <div id="loading-overlay">
            <div class="loader">
            <h2>Loading Pong....</h2>
            </div>
        </div>
        
        <div id="game-container">
            <h1>PONG GAME</h1>
        </div>

    </div>
    <div id="game-container">
        <div id="scoreboard">
            <span id="leftScore">0</span>
            :
            <span id="rightScore">0</span>
        </div>
        
        <div id="center-line"></div>

        <div id="left-paddle" class="paddle"></div>

        <div id="ball"></div>
    </div>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            overflow: hidden;
            font-family:Arial, Helvetica, sans-serif;
            background:black;
        }

        #splash-screen{
            position: fixed;
            width: 100%;
            height:100vh;
            overflow: hidden;
        }
        #splash-screen img{
            width:100%;
            height:100vh;
        }
        #loading-overlay{
            position: absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;

            background:rgba(0,0,0,0.5);

            display: flex;

            flex-direction: column;
            justify-content: center;
            align-items: center;

            opacity:0;
            transition: 1s;
        }
        #loading-overlay.show{
            opacity:1;
        }
        .loader{
            width:80px;
            height:80px;
            border:8px solid cyan;
            border-radius:50%;

            animation:spin 1s linear infinite;
        }
        h2{
            color:white;
            margin-top:20px;
            font-size:30px;
        }
        #game-container{
            display:none;

            width:100%;
            height:100vh;

            background:black;
            color:white;

            justify-content:center;
            align-items: center;
        }
        @keyframes spin{
            100%{
                transform:rotate(360deg);
            }
        }
        #game-container{
            position: relative;

            display: none;

            width:100%;
            height:100vh;

            background:black;

            overflow: hidden;
        }
        #scoreboard{
            position: absolute;

            top:20px;
            left:50%;

            transform:translateX(-50%);

            color:white;

            font-size:60px;
            font-weight:bold;

            z-index:10;
        }
        #center-line{
            position: absolute;

            left:50%;
            top: 0;

            width:4px;
            height:100%;

            background:white;

            transform:translateX(-50%);
        }
        .paddle{
            position: absolute;

            width:20px;
            height:140px;

            background:white;

            border-radius:10px;
        }
        #left-paddle{
            left: 30px;
            top: 40%;
        }
        #right-paddle{
            right:30px;
            top:40%;
        }
        #ball{
            position: absolute;

            width:25px;
            height:25px;

            background:cyan;

            border-radius:50%;

            left:50%;
            top:50%;
        }
    </style>
    <script>
        const loadingoverlay = document.getElementById("loading-overlay");
        const splashscreen = document.getElementById("splash-screen");
        const gamecontainer = document.getElementById("game-container");

        setTimeout(() => {
            loadingoverlay.classList.add("show");
        },3000);

        setTimeout(() => {
            splashscreen.style.display = "none";

            gamecontainer.style.display = "flex";
        }, 9000);

const ball = document.getElementById("ball");

const leftPaddle = document.getElementById("left-paddle");

const rightPaddle = document.getElementById("right-paddle");

const leftScoreText = document.getElementById("leftScore");

const rightScoreText = document.getElementById("rightScore");

/*
BALL POSITION
*/

let ballX = window.innerWidth / 2;
let ballY = window.innerHeight / 2;

let speedX = 6;
let speedY = 6;

/*
PADDLES
*/

let leftPaddleY = window.innerHeight / 2;
let rightPaddleY = window.innerHeight / 2;

const paddleSpeed = 10;

/*
SCORES
*/

let leftScore = 0;
let rightScore = 0;

/*
KEYBOARD
*/

const keys = {};

document.addEventListener("keydown", (e)=>{
    keys[e.key] = true;
});

document.addEventListener("keyup", (e)=>{
    keys[e.key] = false;
});


/*
START GAME
*/

function startGame(){

    gameLoop();
}


/*
MOVE PADDLES
*/

function movePaddles(){

    /*
    LEFT PLAYER
    W and S
    */

    if(keys["w"]){
        leftPaddleY -= paddleSpeed;
    }

    if(keys["s"]){
        leftPaddleY += paddleSpeed;
    }

    /*
    RIGHT PLAYER
    ARROWS
    */

    if(keys["ArrowUp"]){
        rightPaddleY -= paddleSpeed;
    }

    if(keys["ArrowDown"]){
        rightPaddleY += paddleSpeed;
    }

    /*
    APPLY POSITIONS
    */

    leftPaddle.style.top = leftPaddleY + "px";

    rightPaddle.style.top = rightPaddleY + "px";
}


/*
MOVE BALL
*/

function moveBall(){

    ballX += speedX;
    ballY += speedY;

    /*
    TOP/BOTTOM WALLS
    */

    if(ballY <= 0 || ballY >= window.innerHeight - 25){
        speedY *= -1;
    }

    /*
    LEFT PADDLE COLLISION
    */

    if(
        ballX <= 50 &&
        ballY > leftPaddleY &&
        ballY < leftPaddleY + 140
    ){
        speedX *= -1;
    }

    /*
    RIGHT PADDLE COLLISION
    */

    if(
        ballX >= window.innerWidth - 70 &&
        ballY > rightPaddleY &&
        ballY < rightPaddleY + 140
    ){
        speedX *= -1;
    }

    /*
    SCORE SYSTEM
    */

    if(ballX < 0){

        rightScore++;

        rightScoreText.textContent = rightScore;

        resetBall();
    }

    if(ballX > window.innerWidth){

        leftScore++;

        leftScoreText.textContent = leftScore;

        resetBall();
    }

    /*
    APPLY BALL POSITION
    */

    ball.style.left = ballX + "px";

    ball.style.top = ballY + "px";
}


/*
RESET BALL
*/

function resetBall(){

    ballX = window.innerWidth / 2;

    ballY = window.innerHeight / 2;

    speedX *= -1;
}


/*
GAME LOOP
*/

function gameLoop(){

    movePaddles();

    moveBall();

    requestAnimationFrame(gameLoop);
}


    </script>

</body>
</html>
