<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }

    #splash {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                  url('https://images.unsplash.com/photo-1616588587683-5e9b6e0b5e5e') center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 100;
      transition: opacity 1s;
    }

    #title {
      font-size: 4.5rem;
      font-weight: bold;
      text-shadow: 0 0 20px #00ffcc;
      margin-bottom: 20px;
      letter-spacing: 8px;
    }

    #loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 300px;
    }

    #progress-bar {
      width: 100%;
      height: 12px;
      background: #333;
      border: 2px solid #00ffcc;
      margin: 15px 0;
      position: relative;
      overflow: hidden;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffcc, #00ffff);
      transition: width 0.1s linear;
      box-shadow: 0 0 15px #00ffcc;
    }

    #loading-text {
      font-size: 1.2rem;
      margin-top: 10px;
      text-shadow: 0 0 10px #00ffcc;
    }

    canvas {
      display: none;
      background: #111;
      border: 3px solid #00ffcc;
    }
  </style>
</head>
<body>

  <!-- Splash Screen -->
  <div id="splash">
    <h1 id="title">PONG</h1>
    <div id="loading-container">
      <div id="progress-bar">
        <div id="progress"></div>
      </div>
      <div id="loading-text">Loading Game...</div>
    </div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game" width="800" height="500"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const splash = document.getElementById('splash');
    const loadingContainer = document.getElementById('loading-container');
    const progress = document.getElementById('progress');

    // Game variables
    const paddleWidth = 12, paddleHeight = 100;
    let leftPaddle = { x: 30, y: 200, speed: 8 };
    let rightPaddle = { x: 758, y: 200, speed: 8 };
    let ball = { x: 400, y: 250, dx: 6, dy: 4, size: 14 };
    let scoreLeft = 0, scoreRight = 0;
    let keys = {};

    // Show loading after 3 seconds
    setTimeout(() => {
      loadingContainer.style.display = 'flex';
      
      let progressValue = 0;
      const loadingInterval = setInterval(() => {
        progressValue += Math.random() * 8 + 4; // Random speed for realism
        if (progressValue > 100) progressValue = 100;
        
        progress.style.width = progressValue + '%';

        if (progressValue >= 100) {
          clearInterval(loadingInterval);
          setTimeout(() => {
            splash.style.opacity = '0';
            setTimeout(() => {
              splash.style.display = 'none';
              canvas.style.display = 'block';
              gameLoop();
            }, 1000);
          }, 600);
        }
      }, 100);
    }, 3000);

    // Keyboard controls
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    function update() {
      // Paddle movement (2 players)
      if (keys['w'] || keys['W']) leftPaddle.y -= leftPaddle.speed;
      if (keys['s'] || keys['S']) leftPaddle.y += leftPaddle.speed;
      if (keys['ArrowUp']) rightPaddle.y -= rightPaddle.speed;
      if (keys['ArrowDown']) rightPaddle.y += rightPaddle.speed;

      // Keep paddles in bounds
      leftPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, leftPaddle.y));
      rightPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, rightPaddle.y));

      // Ball movement
      ball.x += ball.dx;
      ball.y += ball.dy;

      // Wall bounce
      if (ball.y <= 0 || ball.y >= canvas.height - ball.size) ball.dy *= -1;

      // Paddle collision
      if (ball.x <= leftPaddle.x + paddleWidth && 
          ball.y + ball.size >= leftPaddle.y && 
          ball.y <= leftPaddle.y + paddleHeight) {
        ball.dx *= -1.05; // slight speed increase
      }

      if (ball.x + ball.size >= rightPaddle.x && 
          ball.y + ball.size >= rightPaddle.y && 
          ball.y <= rightPaddle.y + paddleHeight) {
        ball.dx *= -1.05;
      }

      // Scoring
      if (ball.x < 0) {
        scoreRight++;
        resetBall();
      }
      if (ball.x > canvas.width) {
        scoreLeft++;
        resetBall();
      }
    }

    function resetBall() {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.dx = (Math.random() > 0.5 ? 6 : -6);
      ball.dy = (Math.random() * 6 - 3);
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Center line
      ctx.setLineDash([10, 10]);
      ctx.beginPath();
      ctx.moveTo(canvas.width/2, 0);
      ctx.lineTo(canvas.width/2, canvas.height);
      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.setLineDash([]);

      // Paddles
      ctx.fillStyle = '#00ffcc';
      ctx.fillRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
      ctx.fillRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);

      // Ball
      ctx.beginPath();
      ctx.arc(ball.x + ball.size/2, ball.y + ball.size/2, ball.size/2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Scores
      ctx.font = 'bold 48px Arial';
      ctx.fillText(scoreLeft, canvas.width/4, 80);
      ctx.fillText(scoreRight, 3*canvas.width/4, 80);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Start with ball in center
    resetBall();
  </script>
</body>
</html>
