<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixus Bank | Register</title>

    <link rel="stylesheet" href="css/register.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="register-container">

    <div class="register-card">

        <h1>PIXUS BANK</h1>

        <h2>Create Account</h2>

        <form id="registerForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullname">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="phone">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword">
            </div>

            <div class="strength">
                <div id="strengthBar"></div>
            </div>

            <p id="strengthText">
                Password Strength
            </p>

            <div class="terms">

                <input type="checkbox"
                       id="terms">

                <label for="terms">
                    I agree to the Terms and Conditions
                </label>

            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="login-link">
            Already have an account?

            <a href="loginPage.html">
                Login
            </a>
        </p>

    </div>

</div>
<style>
    :root{
    --primary:#081F5C;
    --secondary:#1D4ED8;
    --accent:#60A5FA;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left,#1D4ED8,transparent 30%),
    radial-gradient(circle at bottom right,#60A5FA,transparent 30%),
    #020617;
}

.register-container{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.register-card{
    width:100%;
    max-width:550px;

    padding:40px;

    border-radius:25px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.15);

    color:white;
}

.register-card h1{
    color:var(--accent);
    margin-bottom:10px;
}

.register-card h2{
    margin-bottom:30px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:15px;

    border:none;

    border-radius:12px;
}

.strength{
    width:100%;
    height:10px;

    border-radius:10px;

    background:#1e293b;

    overflow:hidden;

    margin-bottom:10px;
}

#strengthBar{
    width:0%;
    height:100%;
    transition:.3s;
}

#strengthText{
    margin-bottom:20px;
    color:#cbd5e1;
}

.terms{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    width:100%;

    border:none;

    cursor:pointer;

    padding:15px;

    border-radius:12px;

    color:white;

    background:
    linear-gradient(
        135deg,
        var(--secondary),
        var(--accent)
    );
}

.login-link{
    margin-top:20px;
    text-align:center;
}

.login-link a{
    color:var(--accent);
    text-decoration:none;
}
</style>

<script>
const password =
document.getElementById("password");

const strengthBar =
document.getElementById("strengthBar");

const strengthText =
document.getElementById("strengthText");

password.addEventListener("input", () => {

    let value = password.value;

    let strength = 0;

    if(value.length > 5) strength++;

    if(value.length > 8) strength++;

    if(/[A-Z]/.test(value)) strength++;

    if(/[0-9]/.test(value)) strength++;

    if(/[!@#$%^&*]/.test(value)) strength++;

    if(strength <= 2){

        strengthBar.style.width = "30%";
        strengthBar.style.background = "red";

        strengthText.textContent =
        "Weak Password";

    }

    else if(strength <= 4){

        strengthBar.style.width = "65%";
        strengthBar.style.background = "orange";

        strengthText.textContent =
        "Medium Password";

    }

    else{

        strengthBar.style.width = "100%";
        strengthBar.style.background = "limegreen";

        strengthText.textContent =
        "Strong Password";

    }

});

const form =
document.getElementById("registerForm");

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    const fullname =
    document.getElementById("fullname").value;

    const email =
    document.getElementById("email").value;

    const phone =
    document.getElementById("phone").value;

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;

    const terms =
    document.getElementById("terms");

    if(
        fullname === "" ||
        email === "" ||
        phone === "" ||
        password === "" ||
        confirmPassword === ""
    ){

        alert("Please fill all fields");

        return;
    }

    if(password !== confirmPassword){

        alert("Passwords do not match");

        return;
    }

    if(!terms.checked){

        alert("Accept Terms & Conditions");

        return;
    }

    alert(
        "Account Created Successfully!"
    );

});
</script>

</body>
</html>
