    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            background: #f2f2f2;
            display: flex;
            justify-content:center;
            padding:30px;
        }
    
    /* .menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }

      border: 1px solid #ddd; padding: 15px; border-radius: 12px; text-align: center;

    .container{
            width:100%;
            max-width:500px;
            margin:auto;
            display:flex;
            flex-direction: column;
            gap:30px;
        }
    .restaurant-card{
            margin-bottom: 35px;
            width:100%;
            margin-bottom:30px;
            text-decoration: none;
            color:black;
            
        }
    .image-box{
            position: relative;
            height:260px;
            border-radius:22px;
            overflow: hidden;
        }
    .image-box img{
            width: 100%;
            height:100%;
            object-fit: cover;
        }
    .discount{
            position: absolute;
            top:15px;
            left:15px;
            background:#ffd54f;
            padding:10px 16px;
            border-radius:12px;
            font-weight:bold;
            font-size: 20px;
        }
    .logo{
            position:absolute;
            bottom:18px;
            left:18px;

            width: 90px;
            height: 90px;

            border-radius:20px;
            background:white;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size:45px;

            box-shadow:0 4px 15px rgba(0,0,0.2);
        }
    h2{
            margin-top:14px;
            font-size:32px;
            font-weight: 600;
        }
    .info{
            display:flex;
            align-items: center;
            gap:15px;
            margin-top:10px;
            font-size:22px;
        }
    .free{
            background: #ffd54f;
            padding:8px 14px;
            border-radius:12px;
            font-weight:bold;
        }
    .menu { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
      gap: 12px; 
    }
    .item {
      border: 1px solid #ddd; 
      padding: 10px; 
      border-radius: 10px; 
      text-align: center;
      background: white; 
      box-shadow: 0 3px 6px rgba(0,0,0,0.1); 
      cursor: pointer;
    }
    .item:hover { transform: scale(1.03); }
    .item img { 
      width: 100%; 
      height: 110px; 
      object-fit: cover; 
      border-radius: 8px; 
    }
    .item h3 { margin: 8px 0 4px; font-size: 1.05em; }
    .price { color: #e74c3c; font-size: 1.25em; font-weight: bold; }
    .add-btn { 
      background: #27ae60; color: white; 
      padding: 8px; width: 100%; 
      border: none; border-radius: 6px; 
      cursor: pointer; margin-top: 5px;
    }
    .view-cart {
      position: fixed;
      top: 15px;
      right: 15px;
      background: #3498db;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      z-index: 1000;
    }
    h1 { text-align: center; color: #27ae60; }
    .cart-item { 
      display: flex; 
      justify-content: space-between; 
      padding: 12px 0; 
      border-bottom: 1px solid #eee; 
    }
    .total { 
      font-size: 1.5em; 
      font-weight: bold; 
      text-align: center; 
      color: #e74c3c; 
      margin: 20px 0; 
    }
    button { 
      padding: 8px 15px; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
    }
    .remove-btn { background: #e74c3c; color: white; }
    .clear-btn { background: #f39c12; color: white; width: 100%; padding: 12px; margin-top: 15px; }
    .back-btn { background: #3498db; color: white; padding: 10px 20px; text-decoration: none; display: inline-block; margin-bottom: 15px; border-radius: 6px; }

    </style>
    <script>
        
        const restaurantCards = document.querySelectorAll('.restaurant-card');

        restaurantCards.forEach(card => {
            card.addEventListener('click', () => {
                const restaurantName = card.querySelector('h2').innerText;
                alert(`You clicked on ${restaurantName}`);
            });
        });
        let cart = JSON.parse(localStorage.getItem('foodCart')) || [];

    function addToCart(index) {
      const items = [
        { name: "Chicken Republic", price: 6500 },
        { name: "Kentucky Chicken", price: 5800 },
        { name: "The Place", price: 6200 },
        { name: "UdiK Foods", price: 8500 }
      ];

      const item = items[index];
      const existing = cart.find(i => i.name === item.name);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...item, quantity: 1 });
      }

      localStorage.setItem('foodCart', JSON.stringify(cart));
      updateCartCount();
      
      // Feedback
      const btn = event.currentTarget.querySelector('button');
      const originalText = btn.textContent;
      btn.textContent = "Added ✓";
      setTimeout(() => btn.textContent = originalText, 1500);
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;
    }

    // Initialize count
    updateCartCount();
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem('foodCart')) || [];
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#777;'>Your cart is empty</p>";
        document.getElementById('total').textContent = "0";
        return;
      }

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <div>
            <strong>${item.name}</strong><br>
            ₦${item.price.toLocaleString()} × ${item.quantity}
          </div>
          <div style="text-align:right;">
            ₦${itemTotal.toLocaleString()}<br>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
        `;
        container.appendChild(div);
      });

      document.getElementById('total').textContent = total.toLocaleString();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('foodCart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('foodCart', JSON.stringify(cart));
      loadCart();
    }

    function clearCart() {
      if (confirm("Clear all items from cart?")) {
        localStorage.removeItem('foodCart');
        loadCart();
      }
    }

    // Load cart when page opens
    window.onload = loadCart;

    </script>
