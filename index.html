<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#0f172a;
    color:white;
}

/* Navbar */

nav{
    position:fixed;
    top:0;
    width:100%;
    background:#1e293b;
    padding:20px 10%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
}

.logo{
    color:#38bdf8;
    font-size:28px;
    font-weight:bold;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav a{
    text-decoration:none;
    color:white;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* Hero Section */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:4rem;
}

.hero span{
    color:#38bdf8;
}

.hero p{
    margin:20px auto;
    max-width:700px;
    font-size:1.1rem;
}

.btn{
    display:inline-block;
    background:#38bdf8;
    color:white;
    padding:12px 30px;
    border-radius:8px;
    text-decoration:none;
    margin-top:20px;
}

/* Sections */

section{
    padding:100px 10%;
}

.title{
    text-align:center;
    color:#38bdf8;
    margin-bottom:40px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    margin-bottom:20px;
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
}

/* Projects */

.projects{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

/* Skills */

.skills{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
}

.skill{
    background:#1e293b;
    padding:20px;
    text-align:center;
    border-radius:10px;
}

/* Contact */

form{
    max-width:600px;
    margin:auto;
}

input,
textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    background:#38bdf8;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:8px;
}

footer{
    background:#1e293b;
    text-align:center;
    padding:20px;
}

@media(max-width:768px){

.hero h1{
    font-size:2.5rem;
}

nav{
    flex-direction:column;
}

nav ul{
    margin-top:10px;
}
}
</style>

<script>
const text = [
    "Software Engineer",
    "Java Developer",
    "Frontend Developer",
    "Problem Solver"
];

let count = 0;
let index = 0;
let currentText = "";
let letter = "";

(function type(){

    if(count === text.length){
        count = 0;
    }

    currentText = text[count];
    letter = currentText.slice(0, ++index);

    document.querySelector(".typing").textContent = letter;

    if(letter.length === currentText.length){
        count++;
        index = 0;

        setTimeout(type, 1200);
    }
    else{
        setTimeout(type, 100);
    }

})();
</script>

</body>
